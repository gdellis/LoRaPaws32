name: Build ESP-IDF Firmware

on:
  push:
    branches: [main, feature/**, explore/**]
    paths:
      - 'firmware/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    container: espressif/idf:v6.0_esp32c6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py build
