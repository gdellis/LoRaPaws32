name: Build and Test ESP-IDF

on:
  push:
    branches: [main, feature/**, explore/**]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    container: espressif/idf:v5.3.1-esp32c6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py build

      - name: Build tests
        run: |
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py build-component-test
        continue-on-error: true

      - name: Run tests (hardware)
        run: |
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py test
        continue-on-error: true
